<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sidequests</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="public-page">
    <canvas class="background-canvas" id="backgroundCanvas" aria-hidden="true"></canvas>
    <video class="background-source" id="backgroundSource" autoplay muted loop playsinline aria-hidden="true">
      <source src="assets/video-normal.mp4" type="video/mp4" />
    </video>

    <main class="shell">
      <section class="picker">
        <button class="link-button add-sidequest-corner" id="addQuestButton" type="button">Add sidequest</button>

        <div class="intro">
          <p class="eyebrow">Today&apos;s tiny adventure machine</p>
          <h1>Summon a sidequest.</h1>
          <p>
            Pick the rules, press the big button, and let fate hand you a mildly suspicious plan.
          </p>
        </div>

        <form class="filters" id="filterForm">
          <label>
            People
            <select id="peopleFilter" name="people">
              <option value="">Any group size</option>
            </select>
          </label>
          <label>
            Vibe
            <select id="vibeFilter" name="vibe">
              <option value="">Any vibe</option>
            </select>
          </label>
          <label>
            Location
            <select id="locationFilter" name="location">
              <option value="">Any location</option>
            </select>
          </label>
          <label>
            Price
            <select id="priceFilter" name="price">
              <option value="">Any price</option>
            </select>
          </label>
        </form>

        <button class="primary-button" id="getQuestButton" type="button">Get my sidequest</button>
      </section>
    </main>

    <dialog class="modal quest-modal" id="questDialog">
      <article class="modal-panel quest-result" id="questResult" aria-live="polite">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Sidequest unlocked</p>
            <h2 id="questTitle">Your sidequest</h2>
          </div>
          <button class="icon-button" id="closeQuest" type="button" aria-label="Close">x</button>
        </div>
        <div id="questContent"></div>
      </article>
    </dialog>

    <dialog class="modal" id="addQuestDialog">
      <form class="modal-panel" id="addQuestForm" method="dialog">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Submit a sidequest</p>
            <h2>Add your own idea</h2>
          </div>
          <button class="icon-button" id="closeAddQuest" value="cancel" type="button" aria-label="Close">x</button>
        </div>

        <div class="form-grid">
          <label class="span-2">
            Title
            <input name="title" required maxlength="80" placeholder="Midnight diner crawl" />
          </label>
          <label class="span-2">
            Description
            <textarea name="description" required rows="4" maxlength="420" placeholder="What should someone do?"></textarea>
          </label>
          <label>
            Min people
            <input name="minPeople" required type="number" min="1" max="99" value="1" />
          </label>
          <label>
            Max people
            <input name="maxPeople" required type="number" min="1" max="99" value="4" />
          </label>
          <label>
            Your name
            <input name="submitter" required maxlength="60" placeholder="Zach" />
          </label>
          <label>
            Vibe
            <input name="vibe" required maxlength="40" placeholder="Exploration" />
          </label>
          <label>
            Location
            <input name="location" required maxlength="60" placeholder="Anywhere" />
          </label>
          <label>
            Price
            <input name="price" required maxlength="40" placeholder="Free" />
          </label>
        </div>

        <p class="form-error" id="addQuestError"></p>

        <div class="modal-actions">
          <button class="secondary-button" id="cancelAddQuest" type="button">Cancel</button>
          <button class="primary-button" type="submit">Submit sidequest</button>
        </div>
      </form>
    </dialog>

    <script src="background.js?v=9"></script>
    <script src="shared.js?v=4"></script>
    <script src="app.js?v=4"></script>
  </body>
</html>
