<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Zachcade · Pocket of Stuff</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { --paper: #F5F3ED; --ink: #241D1A; --red: #cc551e; --green: #55828b; --cream: #F5F3ED; }
    @font-face { font-family: "Pocket Avant"; src: url("/ITC%20Avant%20Garde%20Gothic%20Bold.otf") format("opentype"); font-weight: 700; font-display: swap; }
    @font-face { font-family: "Pocket Baskerville"; src: url("/Baskerville.ttc") format("truetype-collection"); font-weight: 400; font-display: swap; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: "Pocket Baskerville", Baskerville, Georgia, serif; color: var(--ink); background: radial-gradient(circle, rgba(31, 29, 25, 0.18) 1px, transparent 1.15px) 0 0 / 22px 22px, var(--paper); }
    a { color: inherit; }
    main { width: min(900px, calc(100% - 44px)); margin: 0 auto; padding: 28px 0 70px; }
    .back, .kicker { font-family: "Pocket Avant", "Arial Black", system-ui, sans-serif; color: var(--red); text-transform: uppercase; }
    .back { font-size: 0.78rem; text-decoration: none; }
    .kicker { margin: 74px 0 8px; font-size: 0.84rem; }
    h1 { margin: 0; font-family: "Pocket Avant", "Arial Black", system-ui, sans-serif; font-size: clamp(4rem, 14vw, 9rem); line-height: 0.82; text-transform: uppercase; }
    .card { margin-top: 34px; padding: 30px; border-radius: 8px; color: var(--cream); background: var(--red); box-shadow: 0 16px 30px rgba(31, 29, 25, 0.12); }
    p { max-width: 690px; font-size: 1.18rem; line-height: 1.38; }
  </style>
</head>
<body>
  <main>
    <a class="back" href="/projects/">Back to Projects</a>
    <p class="kicker">Physical</p>
    <h1>Zachcade</h1>
    <section class="card">
      <p>Zachcade is a miniature arcade cabinet made from a laser-cut plywood kit, arcade parts, and a Raspberry Pi running RetroPie.</p>
      <p>It combined woodworking, graphic design, soldering, configuration, and a lot of trial and error.</p>
    </section>
  </main>
</body>
</html>
